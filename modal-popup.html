<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal Popup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f4f5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .open-btn {
    background: #6a5af9;
    color: #fff;
    border: none;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(106,90,249,0.3);
    transition: background 0.2s, transform 0.1s;
  }

  .open-btn:hover { background: #5848e0; }
  .open-btn:active { transform: scale(0.97); }

  /* Overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 20, 30, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s ease;
    z-index: 1000;
  }

  .overlay.active {
    opacity: 1;
    visibility: visible;
  }

  /* Modal box */
  .modal {
    background: #fff;
    width: 100%;
    max-width: 420px;
    border-radius: 16px;
    padding: 28px;
    position: relative;
    box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    transform: translateY(-30px) scale(0.95);
    opacity: 0;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
  }

  .overlay.active .modal {
    transform: translateY(0) scale(1);
    opacity: 1;
  }

  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: #f1f1f5;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 1.1rem;
    color: #666;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
  }

  .modal-close:hover { background: #e6e6eb; }
  .modal-close:active { transform: scale(0.9); }

  .modal h2 {
    font-size: 1.4rem;
    color: #1a1a2e;
    margin-bottom: 6px;
  }

  .modal p.subtitle {
    color: #888;
    font-size: 0.9rem;
    margin-bottom: 20px;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #444;
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 11px 13px;
    border: 2px solid #e6e6eb;
    border-radius: 9px;
    font-size: 0.93rem;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
    resize: vertical;
  }

  .form-group input:focus,
  .form-group textarea:focus {
    border-color: #6a5af9;
  }

  .submit-btn {
    width: 100%;
    background: #6a5af9;
    color: #fff;
    border: none;
    padding: 13px;
    border-radius: 9px;
    font-size: 0.97rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.2s, transform 0.1s;
  }

  .submit-btn:hover { background: #5848e0; }
  .submit-btn:active { transform: scale(0.98); }

  .success-msg {
    display: none;
    text-align: center;
    padding: 10px 0;
    color: #2ecc71;
    font-weight: 600;
    font-size: 0.95rem;
  }

  .success-msg.show {
    display: block;
  }

  @media (max-width: 480px) {
    .modal { padding: 22px; }
    .modal h2 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<button class="open-btn" id="openModalBtn">✉️ Contact Us</button>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" id="closeModalBtn">✕</button>
    <h2>Get in Touch</h2>
    <p class="subtitle">Fill out the form below and we'll get back to you shortly.</p>

    <form id="contactForm">
      <div class="form-group">
        <label for="nameInput">Name</label>
        <input type="text" id="nameInput" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label for="emailInput">Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="messageInput">Message</label>
        <textarea id="messageInput" rows="3" placeholder="How can we help?" required></textarea>
      </div>
      <button type="button" id="sendBtn" class="submit-btn">Send Message</button>
    </form>

    <div class="success-msg" id="successMsg">✅ Message sent! We'll be in touch soon.</div>
  </div>
</div>

<script>
  const openBtn = document.getElementById('openModalBtn');
  const closeBtn = document.getElementById('closeModalBtn');
  const overlay = document.getElementById('overlay');
  const form = document.getElementById('contactForm');
  const successMsg = document.getElementById('successMsg');

  function openModal() {
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
    // Reset state after the closing transition finishes
    setTimeout(() => {
      form.style.display = 'block';
      successMsg.classList.remove('show');
      form.reset();
    }, 250);
  }

  openBtn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);

  // Close when clicking the overlay background (not the modal itself)
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeModal();
  });

  // Close on Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('active')) {
      closeModal();
    }
  });

  // Handle "Send Message" click
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.addEventListener('click', () => {
    // Manual validation since we're not using a native submit event
    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }
    form.style.display = 'none';
    successMsg.classList.add('show');
    setTimeout(closeModal, 1800);
  });

  // Also allow pressing Enter inside a text field to trigger send
  form.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
      sendBtn.click();
    }
  });
</script>

</body>
</html>
